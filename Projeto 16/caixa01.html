<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 { /*Box-Level*/
            height: 110px;
            width: 500px;
            background-color: lightgrey;
            text-align: center;
            border: 10px solid darkslategrey;
            padding: 10px;
            margin: 10px;
            margin: auto;
            outline: 4px dashed salmon;

        }
        a { /*inline-level*/
            border: 3px solid red;
            padding: 5px;
            margin: 5px;
            margin: auto;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">Links são exemplos de caixas inline-level.</a> Vamos ver como tudo isso funciona.</p>
</body>
</html>
