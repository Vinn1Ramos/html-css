<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        
        /*
            Seletores Personalizados

            #   = ID 
            .   = CLASS
            :   = PSEUDO-CLASS
            ::  = PSEUDO-ELEMENT
            >   = CLILDREN
        */

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: blue;
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: green;
        }

        a::after {
            content: ' ⇦';
        }

        a::before {
            content: '⇒ ';
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <uL>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo">Canal Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com">Site do Curso Em Vídeo</a></li>
        <li><a href="https://www.facebook.com/viniramos26/">Meu facebook</a></li>
    </uL>
</body>
</html>
